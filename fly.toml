app = 'payflux-core'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[checks.evidence_health]
  grace_period = "15s"
  interval = "60s"
  method = "GET"
  path = "/api/evidence/health"
  port = 8080
  timeout = "5s"
  type = "http"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
