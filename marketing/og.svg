<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a18" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.6"/>

  <!-- top bar -->
  <g transform="translate(72, 64)">
    <rect x="0" y="0" width="22" height="22" fill="none" stroke="#f7f7f5" stroke-width="2"/>
    <rect x="6" y="6" width="10" height="10" fill="#f7f7f5"/>
    <text x="38" y="17" fill="#f7f7f5" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="2">PAYFLUX</text>
  </g>
  <text x="1128" y="81" text-anchor="end" fill="#6b6b66" font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" letter-spacing="2">PAYMENT RISK INTELLIGENCE · v0.1</text>

  <!-- divider -->
  <line x1="72" y1="120" x2="1128" y2="120" stroke="#1f1f1d" stroke-width="1"/>

  <!-- headline -->
  <g transform="translate(72, 220)">
    <text fill="#f7f7f5" font-family="Instrument Serif, Georgia, serif" font-size="72" letter-spacing="-1.4">
      <tspan x="0" dy="0">Your processor can lock</tspan>
      <tspan x="0" dy="86"><tspan font-style="italic" fill="#c8533a">$680k of your cash</tspan> three weeks</tspan>
      <tspan x="0" dy="86">before they tell you.</tspan>
    </text>
  </g>

  <!-- bottom mono band -->
  <g transform="translate(72, 540)">
    <text fill="#9a9a93" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" letter-spacing="2">412 EVENTS · 1,840 MERCHANTS · 6 PROCESSOR MODELS</text>
  </g>
  <text x="1128" y="554" text-anchor="end" fill="#6b6b66" font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" letter-spacing="2">PAYFLUX.DEV</text>

  <!-- thin rust accent -->
  <line x1="72" y1="495" x2="240" y2="495" stroke="#c8533a" stroke-width="2"/>
</svg>
